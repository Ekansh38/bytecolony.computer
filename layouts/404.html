{{ define "main" }}

<div class="four04">
  <canvas id="four04-canvas"></canvas>
  <div class="four04-content">
    <p class="four04-num">404</p>
    <p class="four04-msg">this page doesn't exist.</p>
    <a href="/" class="four04-link">← back home</a>
  </div>
</div>

<style>
.four04 {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  overflow: hidden;
}
#four04-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
}
.four04-content {
  position: relative; z-index: 1;
  text-align: center;
  pointer-events: none;
}
.four04-num {
  font-size: clamp(6rem, 22vw, 14rem);
  font-weight: 700;
  color: var(--fg);
  opacity: 0.06;
  line-height: 1;
  margin: 0;
  letter-spacing: -0.02em;
}
.four04-msg {
  color: var(--muted);
  font-size: 0.9rem;
  margin: 12px 0 28px;
}
.four04-link {
  pointer-events: auto;
  color: var(--accent);
  font-size: 0.85rem;
  text-decoration: none;
  transition: opacity 0.2s;
}
.four04-link:hover { opacity: 0.7; }

body > header, body > footer { display: none; }
</style>

<script>
(function() {
  document.querySelector('header').style.display = 'none';
  var f = document.querySelector('footer'); if (f) f.style.display = 'none';

  var canvas = document.getElementById('four04-canvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W, H, dpr;

  // boids
  var _mobile = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
  var N = _mobile ? 60 : 180;
  var boids = [];
  var mouse = { x: -9999, y: -9999 };

  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = canvas.offsetWidth;
    H = canvas.offsetHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function init() {
    resize();
    boids = [];
    for (var i = 0; i < N; i++) {
      var angle = Math.random() * Math.PI * 2;
      boids.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: Math.cos(angle) * 1.5,
        vy: Math.sin(angle) * 1.5
      });
    }
  }

  var SEP_R = 24, ALI_R = 60, COH_R = 80;
  var SEP_W = 0.08, ALI_W = 0.045, COH_W = 0.005;
  var MAX_V = 2.8, MOUSE_R = 140, MOUSE_W = 0.15;

  function step() {
    for (var i = 0; i < N; i++) {
      var b = boids[i];
      var sx = 0, sy = 0, ax = 0, ay = 0, cx = 0, cy = 0;
      var sc = 0, ac = 0, cc = 0;

      for (var j = 0; j < N; j++) {
        if (i === j) continue;
        var o = boids[j];
        var dx = o.x - b.x, dy = o.y - b.y;
        var d = Math.sqrt(dx * dx + dy * dy);
        if (d < SEP_R && d > 0) { sx -= dx / d; sy -= dy / d; sc++; }
        if (d < ALI_R) { ax += o.vx; ay += o.vy; ac++; }
        if (d < COH_R) { cx += o.x; cy += o.y; cc++; }
      }

      if (sc) { b.vx += sx / sc * SEP_W; b.vy += sy / sc * SEP_W; }
      if (ac) { b.vx += (ax / ac - b.vx) * ALI_W; b.vy += (ay / ac - b.vy) * ALI_W; }
      if (cc) { b.vx += (cx / cc - b.x) * COH_W; b.vy += (cy / cc - b.y) * COH_W; }

      // mouse attract
      var mdx = mouse.x - b.x, mdy = mouse.y - b.y;
      var md = Math.sqrt(mdx * mdx + mdy * mdy);
      if (md < MOUSE_R && md > 0) {
        b.vx += (mdx / md) * MOUSE_W;
        b.vy += (mdy / md) * MOUSE_W;
      }

      var spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
      if (spd > MAX_V) { b.vx = (b.vx / spd) * MAX_V; b.vy = (b.vy / spd) * MAX_V; }

      b.x += b.vx; b.y += b.vy;

      // wrap
      if (b.x < 0) b.x += W; if (b.x > W) b.x -= W;
      if (b.y < 0) b.y += H; if (b.y > H) b.y -= H;
    }
  }

  function getAccent() {
    return getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#7aa2f7';
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    var accent = getAccent();

    // draw connections
    ctx.strokeStyle = accent;
    for (var i = 0; i < N; i++) {
      for (var j = i + 1; j < N; j++) {
        var dx = boids[i].x - boids[j].x;
        var dy = boids[i].y - boids[j].y;
        var d = Math.sqrt(dx * dx + dy * dy);
        if (d < 50) {
          ctx.globalAlpha = (1 - d / 50) * 0.15;
          ctx.beginPath();
          ctx.moveTo(boids[i].x, boids[i].y);
          ctx.lineTo(boids[j].x, boids[j].y);
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    // draw boids as small dots
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = accent;
    for (var i = 0; i < N; i++) {
      ctx.beginPath();
      ctx.arc(boids[i].x, boids[i].y, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function loop() {
    step();
    draw();
    requestAnimationFrame(loop);
  }

  init();
  loop();

  window.addEventListener('resize', resize);
  canvas.addEventListener('mousemove', function(e) {
    var r = canvas.getBoundingClientRect();
    mouse.x = e.clientX - r.left;
    mouse.y = e.clientY - r.top;
  });
  canvas.addEventListener('mouseleave', function() { mouse.x = -9999; mouse.y = -9999; });
  canvas.addEventListener('touchmove', function(e) {
    var r = canvas.getBoundingClientRect();
    var t = e.touches[0];
    mouse.x = t.clientX - r.left;
    mouse.y = t.clientY - r.top;
  }, { passive: true });
  canvas.addEventListener('touchend', function() { mouse.x = -9999; mouse.y = -9999; });
})();
</script>

{{ end }}
