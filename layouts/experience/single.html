{{ define "main" }}

<a href="{{ .Parent.Permalink }}" class="back">← experience</a>

<h1 class="project-title">{{ .Title }}</h1>
<div class="project-meta">{{ .Params.role }} · {{ .Params.year }}</div>
{{ with .Params.skills }}<div class="li-meta">{{ delimit . " · " }}</div>{{ end }}

{{ .Content }}

<div class="links">
  {{ with .Params.live }}<a href="{{ . }}" target="_blank">live ↗</a>{{ end }}
</div>

{{ end }}
