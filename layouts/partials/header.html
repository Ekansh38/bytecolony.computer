<header>
  <div class="header-top">
    {{ if .IsHome }}<h1 class="site-title">{{ else }}<div class="site-title">{{ end }}<a href="/">{{ partial "ant.html" (dict "w" "36" "h" "26") }} ByteColony</a>{{ if .IsHome }}</h1>{{ else }}</div>{{ end }}
    <div class="header-controls">
      <button class="toggle" id="d-settings-btn" aria-label="settings">[=]</button>
      <button class="toggle" id="term-btn" aria-label="terminal">[:]</button>
      <button class="toggle" id="t" onclick="toggleTheme()" aria-label="switch theme">[dark]</button>
    </div>
  </div>
  <div class="tagline">{{ .Site.Params.tagline }}</div>
  <nav class="nav">
    <a href="/projects" class="nav-primary">projects</a>
    <a href="/writing" class="nav-primary">writing</a>
    <a href="/music" class="nav-primary">music</a>
    <a href="/games" class="nav-primary">games</a>
    <a href="/tools" class="nav-primary">tools</a>
    <a href="/picks">picks</a>
    <a href="/guestbook">guestbook</a>
  </nav>
  <div class="social">
    <a href="{{ .Site.Params.github }}" target="_blank" rel="noopener noreferrer">github ↗</a>
    <a href="{{ .Site.Params.youtube }}" target="_blank" rel="noopener noreferrer" title="bytecolony">youtube ↗</a>
    <a href="{{ .Site.Params.itchio }}" target="_blank" rel="noopener noreferrer">itch.io ↗</a>
  </div>
  <hr class="header-hr">
</header>
