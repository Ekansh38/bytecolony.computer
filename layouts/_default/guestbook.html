{{ define "main" }}
<style>
  .gb-form { margin-bottom: 32px; }
  .gb-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .gb-row input {
    flex: 1; background: var(--code-bg); border: 1px solid var(--border);
    color: var(--fg); font: inherit; font-size: 0.88rem;
    padding: 8px 10px; outline: none;
  }
  .gb-row input:focus { border-color: var(--accent); }
  .gb-row button {
    background: transparent; border: 1px solid var(--border);
    color: var(--accent); font: inherit; font-size: 0.85rem;
    padding: 8px 14px; cursor: pointer; white-space: nowrap;
    transition: background 0.15s, border-color 0.15s;
  }
  .gb-row button:hover { border-color: var(--accent); }
  .gb-row button:disabled { opacity: 0.5; cursor: default; }
  #gb-msg {
    width: 100%; background: var(--code-bg); border: 1px solid var(--border);
    color: var(--fg); font: inherit; font-size: 0.88rem;
    padding: 8px 10px; outline: none; resize: vertical; min-height: 60px;
  }
  #gb-msg:focus { border-color: var(--accent); }
  #gb-status { font-size: 0.82rem; margin-top: 6px; min-height: 1.2em; }

  .gb-entry { padding: 14px 0; border-bottom: 1px solid var(--border); }
  .gb-entry:first-child { border-top: 1px solid var(--border); }
  .gb-entry-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .gb-entry-name { font-weight: 700; font-size: 0.92rem; }
  .gb-entry-date { color: var(--muted); font-size: 0.78rem; }
  .gb-entry-msg { color: var(--fg); font-size: 0.88rem; line-height: 1.55; white-space: pre-wrap; word-break: break-word; }

  .gb-del-btn {
    background: none; border: none; color: var(--muted); font: inherit;
    font-size: 0.72rem; cursor: pointer; padding: 0 4px; opacity: 0.4;
    transition: opacity 0.15s, color 0.15s;
  }
  .gb-del-btn:hover { opacity: 1; color: #f7768e; }
  #gb-admin-toggle {
    background: none; border: none; color: var(--muted); font: inherit;
    font-size: 0.78rem; cursor: pointer; padding: 0; opacity: 0.3;
    transition: opacity 0.15s;
  }
  #gb-admin-toggle:hover { opacity: 0.7; }
  #gb-admin-bar {
    display: none; margin-top: 12px; gap: 8px; align-items: center;
  }
  #gb-admin-bar.open { display: flex; }
  #gb-admin-code {
    background: var(--code-bg); border: 1px solid var(--border);
    color: var(--fg); font: inherit; font-size: 0.82rem;
    padding: 4px 8px; width: 160px; outline: none;
  }
</style>

<h1 style="margin-bottom:6px;">guestbook</h1>
<p style="color:var(--muted);margin-bottom:24px;">leave a note. say something nice, say something mean, say anything. no account needed.</p>

<div class="gb-form">
  <div class="gb-row">
    <input id="gb-name" type="text" placeholder="name (optional)" maxlength="50" autocomplete="off" spellcheck="false">
    <button id="gb-submit">sign</button>
  </div>
  <textarea id="gb-msg" placeholder="your message" maxlength="500" rows="3" spellcheck="false"></textarea>
  <input id="gb-hp" type="text" tabindex="-1" autocomplete="off" style="display:none">
  <div id="gb-status"></div>
</div>

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
  <h3 style="margin:0;">entries</h3>
  <button id="gb-admin-toggle">[admin]</button>
</div>
<div id="gb-admin-bar">
  <input id="gb-admin-code" type="password" placeholder="master code" autocomplete="off">
</div>

<div id="gb-entries">
  <p style="color:var(--muted)">loading...</p>
</div>

<script>
(function() {
  var API = '/api/guestbook';
  var _entries = null;

  function fmt(d) {
    if (!d) return '';
    // handle both "2026-05-20" and full ISO
    var parts = d.split('T')[0].split('-');
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[parseInt(parts[1],10)-1] + ' ' + parseInt(parts[2],10) + ', ' + parts[0];
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function getAdminCode() {
    return (document.getElementById('gb-admin-code') || {}).value || '';
  }

  function render(entries) {
    var el = document.getElementById('gb-entries');
    var admin = getAdminCode().length > 0;
    if (!entries.length) {
      el.innerHTML = '<p style="color:var(--muted)">no entries yet. be the first.</p>';
      return;
    }
    el.innerHTML = entries.map(function(e) {
      return '<div class="gb-entry" data-id="' + esc(e.id || '') + '">'
        + '<div class="gb-entry-head">'
        + '<span class="gb-entry-name">' + esc(e.name || 'anonymous') + '</span>'
        + '<span style="display:flex;align-items:center;gap:8px;">'
        + '<span class="gb-entry-date">' + fmt(e.date) + '</span>'
        + (admin && e.id ? '<button class="gb-del-btn" data-id="' + esc(e.id) + '">delete</button>' : '')
        + '</span>'
        + '</div>'
        + '<div class="gb-entry-msg">' + esc(e.message) + '</div>'
        + '</div>';
    }).join('');

    if (admin) {
      el.querySelectorAll('.gb-del-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var id = this.getAttribute('data-id');
          if (!id) return;
          this.textContent = '...';
          fetch(API, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id, code: getAdminCode() })
          }).then(function(r) { return r.json(); }).then(function(d) {
            if (d.ok) { _entries = _entries.filter(function(e) { return e.id !== id; }); render(_entries); }
            else { btn.textContent = d.error || 'error'; }
          }).catch(function() { btn.textContent = 'error'; });
        });
      });
    }
  }

  function setStatus(msg, color) {
    var el = document.getElementById('gb-status');
    el.textContent = msg;
    el.style.color = color || 'var(--muted)';
  }

  function loadEntries() {
    fetch(API, { cache: 'no-store' }).then(function(r) { return r.json(); }).then(function(data) {
      _entries = data;
      render(data);
    }).catch(function() {
      document.getElementById('gb-entries').innerHTML = '<p style="color:var(--muted)">couldn\'t load entries.</p>';
    });
  }

  loadEntries();

  // admin toggle
  document.getElementById('gb-admin-toggle').addEventListener('click', function() {
    var bar = document.getElementById('gb-admin-bar');
    bar.classList.toggle('open');
    if (bar.classList.contains('open')) document.getElementById('gb-admin-code').focus();
  });
  document.getElementById('gb-admin-code').addEventListener('input', function() {
    if (_entries) render(_entries);
  });

  // submit
  document.getElementById('gb-submit').addEventListener('click', function() {
    var name    = document.getElementById('gb-name').value.trim();
    var message = document.getElementById('gb-msg').value.trim();
    var hp      = document.getElementById('gb-hp').value;

    if (!message) { setStatus('write something!'); return; }

    var btn = this;
    btn.disabled = true;
    btn.textContent = '...';
    setStatus('');

    fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name || '', message: message, hp: hp })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) { setStatus(data.error); return; }
      document.getElementById('gb-name').value = '';
      document.getElementById('gb-msg').value = '';
      setStatus('signed. thanks!', 'var(--accent)');
      _entries = [data].concat(_entries || []);
      render(_entries);
    })
    .catch(function() { setStatus('network error. try again.'); })
    .finally(function() { btn.disabled = false; btn.textContent = 'sign'; });
  });
})();
</script>
{{ end }}
