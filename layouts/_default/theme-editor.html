{{ define "main" }}
<div id="admin-app">
  <!-- Auth gate -->
  <div id="admin-auth">
    <div class="adm-auth-box">
      <h2>admin</h2>
      <p class="adm-auth-hint">enter master code</p>
      <div class="adm-auth-row">
        <input type="password" id="adm-code" placeholder="master code" autocomplete="off">
        <button id="adm-login" class="adm-btn adm-btn-primary">enter</button>
      </div>
      <p id="adm-auth-err"></p>
    </div>
  </div>

  <!-- Admin panel (hidden until auth) -->
  <div id="admin-panel" style="display:none;">
    <div class="adm-top">
      <h2>admin</h2>
      <button id="adm-logout" class="adm-btn adm-btn-sm">logout</button>
    </div>

    <div class="adm-tabs">
      <button class="adm-tab active" data-tab="presets">presets</button>
      <button class="adm-tab" data-tab="guestbook">guestbook</button>
      <button class="adm-tab" data-tab="arcade">arcade</button>
    </div>

    <div class="adm-tab-content" id="tab-presets">
      <div class="adm-section-header">
        <span class="adm-section-status" id="preset-status"></span>
        <div class="adm-section-actions">
          <button id="preset-seed" class="adm-btn adm-btn-sm">seed from code</button>
          <button id="preset-save" class="adm-btn adm-btn-sm adm-btn-primary">save all</button>
        </div>
      </div>
      <div id="preset-list"></div>
    </div>

    <div class="adm-tab-content" id="tab-guestbook" style="display:none;">
      <div class="adm-section-header">
        <span class="adm-section-status" id="gb-status"></span>
      </div>
      <div id="gb-list"></div>
    </div>

    <div class="adm-tab-content" id="tab-arcade" style="display:none;">
      <div class="adm-section-header">
        <span class="adm-section-status" id="arc-status"></span>
      </div>
      <div id="arc-list"></div>
    </div>
  </div>
</div>

<style>
  header, footer { display: none !important; }
  body { max-width: 1000px !important; }
  #admin-app { padding: 20px 0; }

  /* Auth */
  #admin-auth { display: flex; align-items: center; justify-content: center; min-height: 60vh; }
  .adm-auth-box { text-align: center; }
  .adm-auth-box h2 { margin-bottom: 12px; color: var(--fg); }
  .adm-auth-hint { color: var(--muted); margin-bottom: 16px; font-size: 0.9rem; }
  .adm-auth-row { display: flex; gap: 8px; justify-content: center; }
  .adm-auth-row input {
    background: var(--code-bg); border: 1px solid var(--border); color: var(--fg);
    font-family: inherit; font-size: inherit; padding: 8px 14px; outline: none; width: 240px;
  }
  .adm-auth-row input:focus { border-color: var(--accent); }
  #adm-auth-err { color: var(--code-err); margin-top: 10px; font-size: 0.85rem; min-height: 1.2em; }

  /* Buttons */
  .adm-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: inherit; font-size: 0.85rem; padding: 6px 14px; cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  .adm-btn:hover { color: var(--accent); border-color: var(--accent); }
  .adm-btn-primary { color: var(--accent); border-color: var(--accent); }
  .adm-btn-primary:hover { background: var(--accent); color: var(--bg); }
  .adm-btn-danger:hover { background: var(--code-err); color: var(--bg); border-color: var(--code-err); }
  .adm-btn-sm { font-size: 0.78rem; padding: 4px 10px; }

  /* Top bar */
  .adm-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .adm-top h2 { margin: 0; color: var(--fg); }

  /* Tabs */
  .adm-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .adm-tab {
    background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--muted); font-family: inherit; font-size: 0.9rem;
    padding: 10px 20px; cursor: pointer; transition: color 0.15s, border-color 0.15s;
  }
  .adm-tab:hover { color: var(--fg); }
  .adm-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Section header */
  .adm-section-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
  }
  .adm-section-status { font-size: 0.82rem; color: var(--muted); }
  .adm-section-actions { display: flex; gap: 6px; }

  /* Cards (shared) */
  .adm-card {
    border: 1px solid var(--border); padding: 14px 16px; margin-bottom: -1px;
    transition: border-color 0.15s;
  }
  .adm-card:first-child { border-radius: 4px 4px 0 0; }
  .adm-card:last-child { border-radius: 0 0 4px 4px; margin-bottom: 0; }
  .adm-card:only-child { border-radius: 4px; }

  .adm-card-bar {
    display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none;
  }
  .adm-card-arrow {
    color: var(--muted); font-size: 0.7rem; transition: transform 0.2s;
    width: 14px; text-align: center; flex-shrink: 0;
  }
  .adm-card.expanded .adm-card-arrow { transform: rotate(90deg); }
  .adm-card-title { font-weight: 700; font-size: 0.92rem; flex: 1; }
  .adm-card-meta { color: var(--muted); font-size: 0.78rem; }
  .adm-card-actions { display: flex; gap: 6px; }
  .adm-card-body { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .adm-card.expanded .adm-card-body { display: block; }

  /* Preset-specific */
  .adm-preset-swatch {
    width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0;
  }
  .adm-param-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 6px;
  }
  .adm-param {
    display: flex; align-items: center; gap: 6px; padding: 4px 8px;
    background: var(--code-bg); border-radius: 3px; font-size: 0.8rem;
  }
  .adm-param label { color: var(--muted); flex: 1; white-space: nowrap; }
  .adm-param input[type="number"], .adm-param input[type="text"], .adm-param select {
    background: var(--bg); border: 1px solid var(--border); color: var(--fg);
    font-family: inherit; font-size: 0.8rem; padding: 2px 6px; outline: none; width: 70px;
  }
  .adm-param input:focus, .adm-param select:focus { border-color: var(--accent); }

  /* Guestbook entry */
  .adm-gb-msg { font-size: 0.88rem; line-height: 1.6; margin-top: 4px; white-space: pre-wrap; word-break: break-word; }
  .adm-gb-context { color: var(--muted); font-size: 0.78rem; }

  /* Arcade entry */
  .adm-arc-desc { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }
  .adm-arc-author { color: var(--muted); font-size: 0.78rem; }
</style>

<script>
(function () {
  var API = '/api/themes';
  var masterCode = localStorage.getItem('bc-admin-code') || '';
  var presets = {};

  // ── Auth ──
  var codeInput = document.getElementById('adm-code');
  var loginBtn = document.getElementById('adm-login');
  var authErr = document.getElementById('adm-auth-err');

  function headers() {
    return { 'Content-Type': 'application/json', 'X-Master-Code': masterCode };
  }

  function doLogin() {
    masterCode = codeInput.value.trim();
    if (!masterCode) { authErr.textContent = 'enter code'; return; }
    authErr.textContent = 'checking...';
    fetch(API + '?action=verify', { headers: { 'X-Master-Code': masterCode } })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        if (!d.ok) { authErr.textContent = 'wrong code'; return; }
        localStorage.setItem('bc-admin-code', masterCode);
        showPanel();
      })
      .catch(function () { authErr.textContent = 'network error'; });
  }

  loginBtn.addEventListener('click', doLogin);
  codeInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin(); });

  // auto-login if saved
  if (masterCode) {
    fetch(API + '?action=verify', { headers: { 'X-Master-Code': masterCode } })
      .then(function (r) { return r.json(); })
      .then(function (d) { if (d.ok) showPanel(); })
      .catch(function () {});
  }

  function showPanel() {
    document.getElementById('admin-auth').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    loadPresets();
  }

  // Logout
  document.getElementById('adm-logout').addEventListener('click', function () {
    localStorage.removeItem('bc-admin-code');
    masterCode = '';
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('admin-auth').style.display = 'flex';
    codeInput.value = '';
    authErr.textContent = '';
  });

  // ── Tabs ──
  document.querySelectorAll('.adm-tab').forEach(function (tab) {
    tab.addEventListener('click', function () {
      document.querySelectorAll('.adm-tab').forEach(function (t) { t.classList.remove('active'); });
      document.querySelectorAll('.adm-tab-content').forEach(function (c) { c.style.display = 'none'; });
      tab.classList.add('active');
      var target = document.getElementById('tab-' + tab.getAttribute('data-tab'));
      if (target) target.style.display = 'block';
      // lazy load
      if (tab.getAttribute('data-tab') === 'guestbook') loadGuestbook();
      if (tab.getAttribute('data-tab') === 'arcade') loadArcade();
    });
  });

  // ══════════════════════════════════════════════════════════════
  // PRESETS
  // ══════════════════════════════════════════════════════════════
  var THEMES = ['tokyo-night','gruvbox','dracula','rose-pine','github-light','papercolor-light','hacker'];
  var SIMS = ['combo','life','boids'];

  function loadPresets() {
    document.getElementById('preset-status').textContent = 'loading...';
    fetch(API + '?action=presets')
      .then(function (r) { return r.json(); })
      .then(function (d) {
        presets = d.presets || {};
        if (!Object.keys(presets).length) {
          document.getElementById('preset-status').textContent = 'no presets in DB — click "seed from code" to import';
        } else {
          document.getElementById('preset-status').textContent = Object.keys(presets).length + ' presets';
        }
        renderPresets();
      })
      .catch(function (err) { document.getElementById('preset-status').textContent = 'error: ' + err.message; });
  }

  function renderPresets() {
    var list = document.getElementById('preset-list');
    list.innerHTML = '';
    Object.keys(presets).forEach(function (name) {
      var p = presets[name];
      var card = document.createElement('div');
      card.className = 'adm-card';

      var bar = document.createElement('div');
      bar.className = 'adm-card-bar';

      var arrow = document.createElement('span');
      arrow.className = 'adm-card-arrow';
      arrow.textContent = '\u25B6';

      var swatch = document.createElement('span');
      swatch.className = 'adm-preset-swatch';
      // color from theme accent
      var themeColors = {'tokyo-night':'#7aa2f7','gruvbox':'#d79921','dracula':'#bd93f9','rose-pine':'#b4637a','github-light':'#0969da','papercolor-light':'#005f87','hacker':'#00ff41'};
      swatch.style.background = themeColors[p.theme] || 'var(--accent)';

      var title = document.createElement('span');
      title.className = 'adm-card-title';
      title.textContent = name;

      var meta = document.createElement('span');
      meta.className = 'adm-card-meta';
      meta.textContent = p.sim + (p.theme ? ' · ' + p.theme : '') + (p.desc ? ' · ' + p.desc : '');

      var actions = document.createElement('span');
      actions.className = 'adm-card-actions';
      var delBtn = document.createElement('button');
      delBtn.className = 'adm-btn adm-btn-sm adm-btn-danger';
      delBtn.textContent = 'delete';
      delBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        if (!confirm('delete "' + name + '"?')) return;
        delete presets[name];
        renderPresets();
      });
      actions.appendChild(delBtn);

      bar.appendChild(arrow);
      bar.appendChild(swatch);
      bar.appendChild(title);
      bar.appendChild(meta);
      bar.appendChild(actions);
      bar.addEventListener('click', function () { card.classList.toggle('expanded'); });

      // Body
      var body = document.createElement('div');
      body.className = 'adm-card-body';

      // Top-level fields
      var topGrid = document.createElement('div');
      topGrid.className = 'adm-param-grid';
      topGrid.style.marginBottom = '10px';

      // sim
      var simParam = mkSelect('sim', p.sim, SIMS, function (v) { p.sim = v; meta.textContent = p.sim + (p.theme ? ' · ' + p.theme : ''); });
      topGrid.appendChild(simParam);
      // theme
      var themeParam = mkSelect('theme', p.theme || '', [''].concat(THEMES), function (v) { p.theme = v || undefined; swatch.style.background = themeColors[v] || 'var(--accent)'; meta.textContent = p.sim + (p.theme ? ' · ' + p.theme : ''); });
      topGrid.appendChild(themeParam);
      // desc
      topGrid.appendChild(mkText('desc', p.desc || '', function (v) { p.desc = v; }));
      // lspeed, bspeed
      topGrid.appendChild(mkNum('lspeed', p.lspeed, function (v) { p.lspeed = v; }));
      topGrid.appendChild(mkNum('bspeed', p.bspeed, function (v) { p.bspeed = v; }));
      body.appendChild(topGrid);

      // Params
      if (p.params) {
        var paramLabel = document.createElement('div');
        paramLabel.style.cssText = 'font-size:0.78rem;color:var(--muted);margin:8px 0 6px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;';
        paramLabel.textContent = 'params';
        body.appendChild(paramLabel);

        var paramGrid = document.createElement('div');
        paramGrid.className = 'adm-param-grid';
        Object.keys(p.params).forEach(function (key) {
          paramGrid.appendChild(mkNum(key, p.params[key], function (v) { p.params[key] = v; }));
        });
        body.appendChild(paramGrid);
      }

      // Apply button
      var applyBtn = document.createElement('button');
      applyBtn.className = 'adm-btn adm-btn-sm';
      applyBtn.textContent = 'preview on site';
      applyBtn.style.marginTop = '10px';
      applyBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        if (window.applyPreset && typeof window.applyPreset === 'function') {
          // temporarily inject into PRESETS
          window.applyPreset(name);
        }
      });
      body.appendChild(applyBtn);

      card.appendChild(bar);
      card.appendChild(body);
      list.appendChild(card);
    });
  }

  function mkNum(label, value, onChange) {
    var el = document.createElement('div');
    el.className = 'adm-param';
    var lbl = document.createElement('label');
    lbl.textContent = label;
    var inp = document.createElement('input');
    inp.type = 'number';
    inp.step = 'any';
    inp.value = value != null ? value : '';
    inp.addEventListener('change', function () {
      var v = inp.value === '' ? null : parseFloat(inp.value);
      onChange(v);
    });
    el.appendChild(lbl);
    el.appendChild(inp);
    return el;
  }

  function mkText(label, value, onChange) {
    var el = document.createElement('div');
    el.className = 'adm-param';
    var lbl = document.createElement('label');
    lbl.textContent = label;
    var inp = document.createElement('input');
    inp.type = 'text';
    inp.value = value;
    inp.style.width = '120px';
    inp.addEventListener('change', function () { onChange(inp.value); });
    el.appendChild(lbl);
    el.appendChild(inp);
    return el;
  }

  function mkSelect(label, value, options, onChange) {
    var el = document.createElement('div');
    el.className = 'adm-param';
    var lbl = document.createElement('label');
    lbl.textContent = label;
    var sel = document.createElement('select');
    options.forEach(function (o) {
      var opt = document.createElement('option');
      opt.value = o; opt.textContent = o || '(none)';
      if (o === value) opt.selected = true;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', function () { onChange(sel.value); });
    el.appendChild(lbl);
    el.appendChild(sel);
    return el;
  }

  // Seed from code
  document.getElementById('preset-seed').addEventListener('click', function () {
    if (typeof window.getPresetNames !== 'function') {
      document.getElementById('preset-status').textContent = 'bg-sim not loaded on this page';
      return;
    }
    var names = window.getPresetNames();
    names.forEach(function (n) {
      if (!presets[n]) {
        // read from the live PRESETS object
        var p = window._getPresetData ? window._getPresetData(n) : null;
        if (p) presets[n] = JSON.parse(JSON.stringify(p));
      }
    });
    renderPresets();
    document.getElementById('preset-status').textContent = 'seeded ' + names.length + ' presets from code — click save';
  });

  // Save presets
  document.getElementById('preset-save').addEventListener('click', function () {
    document.getElementById('preset-status').textContent = 'saving...';
    fetch(API, {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({ action: 'save-presets', presets: presets })
    }).then(function (r) { return r.json(); }).then(function (d) {
      if (d.error) { document.getElementById('preset-status').textContent = 'error: ' + d.error; return; }
      document.getElementById('preset-status').textContent = 'saved ' + d.count + ' presets';
    }).catch(function (err) { document.getElementById('preset-status').textContent = 'error: ' + err.message; });
  });

  // ══════════════════════════════════════════════════════════════
  // GUESTBOOK
  // ══════════════════════════════════════════════════════════════
  var gbLoaded = false;
  function loadGuestbook() {
    if (gbLoaded) return;
    gbLoaded = true;
    document.getElementById('gb-status').textContent = 'loading...';
    fetch(API + '?action=guestbook', { headers: headers() })
      .then(function (r) { return r.json(); })
      .then(function (entries) {
        if (entries.error) { document.getElementById('gb-status').textContent = entries.error; return; }
        document.getElementById('gb-status').textContent = entries.length + ' entries';
        renderGuestbook(entries);
      })
      .catch(function (err) { document.getElementById('gb-status').textContent = 'error: ' + err.message; });
  }

  function renderGuestbook(entries) {
    var list = document.getElementById('gb-list');
    list.innerHTML = '';
    if (!entries.length) { list.innerHTML = '<p style="color:var(--muted)">no entries</p>'; return; }
    entries.forEach(function (e) {
      var card = document.createElement('div');
      card.className = 'adm-card';

      var bar = document.createElement('div');
      bar.className = 'adm-card-bar';

      var title = document.createElement('span');
      title.className = 'adm-card-title';
      title.textContent = e.name || 'anonymous';

      var meta = document.createElement('span');
      meta.className = 'adm-card-meta';
      meta.textContent = (e.context ? e.context + ' · ' : '') + (e.date || '');

      var actions = document.createElement('span');
      actions.className = 'adm-card-actions';
      var delBtn = document.createElement('button');
      delBtn.className = 'adm-btn adm-btn-sm adm-btn-danger';
      delBtn.textContent = 'delete';
      delBtn.addEventListener('click', function (ev) {
        ev.stopPropagation();
        if (!confirm('delete entry by "' + (e.name || 'anonymous') + '"?')) return;
        delBtn.textContent = '...';
        fetch(API, {
          method: 'POST',
          headers: headers(),
          body: JSON.stringify({ action: 'delete-guestbook', id: e.id })
        }).then(function (r) { return r.json(); }).then(function (d) {
          if (d.ok) { card.remove(); }
          else { delBtn.textContent = 'err'; }
        }).catch(function () { delBtn.textContent = 'err'; });
      });
      actions.appendChild(delBtn);

      bar.appendChild(title);
      bar.appendChild(meta);
      bar.appendChild(actions);

      var msg = document.createElement('div');
      msg.className = 'adm-gb-msg';
      msg.textContent = e.message || '';

      card.appendChild(bar);
      card.appendChild(msg);
      list.appendChild(card);
    });
  }

  // ══════════════════════════════════════════════════════════════
  // ARCADE
  // ══════════════════════════════════════════════════════════════
  var arcLoaded = false;
  function loadArcade() {
    if (arcLoaded) return;
    arcLoaded = true;
    document.getElementById('arc-status').textContent = 'loading...';
    fetch(API + '?action=games', { headers: headers() })
      .then(function (r) { return r.json(); })
      .then(function (games) {
        if (games.error) { document.getElementById('arc-status').textContent = games.error; return; }
        document.getElementById('arc-status').textContent = games.length + ' games';
        renderArcade(games);
      })
      .catch(function (err) { document.getElementById('arc-status').textContent = 'error: ' + err.message; });
  }

  function renderArcade(games) {
    var list = document.getElementById('arc-list');
    list.innerHTML = '';
    if (!games.length) { list.innerHTML = '<p style="color:var(--muted)">no games</p>'; return; }
    games.forEach(function (g) {
      var card = document.createElement('div');
      card.className = 'adm-card';

      var bar = document.createElement('div');
      bar.className = 'adm-card-bar';

      var arrow = document.createElement('span');
      arrow.className = 'adm-card-arrow';
      arrow.textContent = '\u25B6';

      var title = document.createElement('span');
      title.className = 'adm-card-title';
      title.textContent = g.title || g.id;

      var meta = document.createElement('span');
      meta.className = 'adm-card-meta';
      meta.textContent = (g.author || 'anon') + ' · ' + (g.date || '');

      var actions = document.createElement('span');
      actions.className = 'adm-card-actions';
      var delBtn = document.createElement('button');
      delBtn.className = 'adm-btn adm-btn-sm adm-btn-danger';
      delBtn.textContent = 'delete';
      delBtn.addEventListener('click', function (ev) {
        ev.stopPropagation();
        if (!confirm('delete "' + (g.title || g.id) + '"?')) return;
        delBtn.textContent = '...';
        fetch(API, {
          method: 'POST',
          headers: headers(),
          body: JSON.stringify({ action: 'delete-game', id: g.id })
        }).then(function (r) { return r.json(); }).then(function (d) {
          if (d.ok) { card.remove(); }
          else { delBtn.textContent = 'err'; }
        }).catch(function () { delBtn.textContent = 'err'; });
      });
      actions.appendChild(delBtn);

      bar.appendChild(arrow);
      bar.appendChild(title);
      bar.appendChild(meta);
      bar.appendChild(actions);
      bar.addEventListener('click', function () { card.classList.toggle('expanded'); });

      // Body with game details
      var body = document.createElement('div');
      body.className = 'adm-card-body';
      body.innerHTML =
        '<div class="adm-arc-desc">' + (g.desc || 'no description') + '</div>' +
        '<div style="margin-top:8px;font-size:0.78rem;color:var(--muted);">' +
        'id: ' + (g.id || '') + ' · lb: ' + (g.lbMode || 'none') + (g.locked ? ' · locked' : '') +
        '</div>';

      card.appendChild(bar);
      card.appendChild(body);
      list.appendChild(card);
    });
  }
})();
</script>
{{ end }}
