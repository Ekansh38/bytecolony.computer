{{ define "main" }}
<div id="admin-app">
  <!-- Auth gate -->
  <div id="admin-auth">
    <div class="adm-auth-box">
      <h2>admin</h2>
      <p class="adm-auth-hint">enter master code</p>
      <div class="adm-auth-row">
        <input type="password" id="adm-code" placeholder="master code" autocomplete="off">
        <button id="adm-login" class="adm-btn adm-btn-primary">enter</button>
      </div>
      <p id="adm-auth-err"></p>
    </div>
  </div>

  <!-- Admin panel (hidden until auth) -->
  <div id="admin-panel" style="display:none;">
    <div class="adm-top">
      <h2>admin</h2>
      <button id="adm-logout" class="adm-btn adm-btn-sm">logout</button>
    </div>

    <div class="adm-tabs">
      <button class="adm-tab active" data-tab="presets">presets</button>
      <button class="adm-tab" data-tab="guestbook">guestbook</button>
      <button class="adm-tab" data-tab="comments">comments</button>
      <button class="adm-tab" data-tab="arcade">arcade</button>
    </div>

    <div class="adm-tab-content" id="tab-presets">
      <div class="adm-section-header">
        <span class="adm-section-status" id="preset-status"></span>
        <div class="adm-section-actions">
          <button id="preset-new" class="adm-btn adm-btn-sm">+ new preset</button>
          <button id="preset-save" class="adm-btn adm-btn-sm adm-btn-primary">save all</button>
        </div>
      </div>
      <div id="preset-list"></div>
    </div>

    <div class="adm-tab-content" id="tab-guestbook" style="display:none;">
      <div class="adm-section-header">
        <span class="adm-section-status" id="gb-status"></span>
      </div>
      <div id="gb-list"></div>
    </div>

    <div class="adm-tab-content" id="tab-comments" style="display:none;">
      <div class="adm-section-header">
        <span class="adm-section-status" id="cmt-status"></span>
      </div>
      <div id="cmt-list-admin"></div>
    </div>

    <div class="adm-tab-content" id="tab-arcade" style="display:none;">
      <div class="adm-section-header">
        <span class="adm-section-status" id="arc-status"></span>
      </div>
      <div id="arc-list"></div>
    </div>
  </div>
</div>

<style>
  header, footer { display: none !important; }
  body { max-width: 1000px !important; }
  #admin-app { padding: 20px 0; }

  /* Auth */
  #admin-auth { display: flex; align-items: center; justify-content: center; min-height: 60vh; }
  .adm-auth-box { text-align: center; }
  .adm-auth-box h2 { margin-bottom: 12px; color: var(--fg); }
  .adm-auth-hint { color: var(--muted); margin-bottom: 16px; font-size: 0.9rem; }
  .adm-auth-row { display: flex; gap: 8px; justify-content: center; }
  .adm-auth-row input {
    background: var(--code-bg); border: 1px solid var(--border); color: var(--fg);
    font-family: inherit; font-size: inherit; padding: 8px 14px; outline: none; width: 240px;
  }
  .adm-auth-row input:focus { border-color: var(--accent); }
  #adm-auth-err { color: var(--code-err); margin-top: 10px; font-size: 0.85rem; min-height: 1.2em; }

  /* Buttons */
  .adm-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: inherit; font-size: 0.85rem; padding: 6px 14px; cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  .adm-btn:hover { color: var(--accent); border-color: var(--accent); }
  .adm-btn-primary { color: var(--accent); border-color: var(--accent); }
  .adm-btn-primary:hover { background: var(--accent); color: var(--bg); }
  .adm-btn-danger:hover { background: var(--code-err); color: var(--bg); border-color: var(--code-err); }
  .adm-btn-sm { font-size: 0.78rem; padding: 4px 10px; }

  /* Top bar */
  .adm-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .adm-top h2 { margin: 0; color: var(--fg); }

  /* Tabs */
  .adm-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .adm-tab {
    background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--muted); font-family: inherit; font-size: 0.9rem;
    padding: 10px 20px; cursor: pointer; transition: color 0.15s, border-color 0.15s;
  }
  .adm-tab:hover { color: var(--fg); }
  .adm-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Section header */
  .adm-section-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
  }
  .adm-section-status { font-size: 0.82rem; color: var(--muted); }
  .adm-section-actions { display: flex; gap: 6px; }

  /* Cards (shared) */
  .adm-card {
    border: 1px solid var(--border); padding: 14px 16px; margin-bottom: -1px;
    transition: border-color 0.15s;
  }
  .adm-card:first-child { border-radius: 4px 4px 0 0; }
  .adm-card:last-child { border-radius: 0 0 4px 4px; margin-bottom: 0; }
  .adm-card:only-child { border-radius: 4px; }

  .adm-card-bar {
    display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none;
  }
  .adm-card-arrow {
    color: var(--muted); font-size: 0.7rem; transition: transform 0.2s;
    width: 14px; text-align: center; flex-shrink: 0;
  }
  .adm-card.expanded .adm-card-arrow { transform: rotate(90deg); }
  .adm-card-title { font-weight: 700; font-size: 0.92rem; flex: 1; }
  .adm-card-meta { color: var(--muted); font-size: 0.78rem; }
  .adm-card-actions { display: flex; gap: 6px; }
  .adm-card-body { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .adm-card.expanded .adm-card-body { display: block; }

  /* Preset-specific */
  .adm-preset-swatch {
    width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0;
  }
  .adm-param-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 6px;
  }
  .adm-param {
    display: flex; align-items: center; gap: 8px; padding: 6px 10px;
    background: var(--code-bg); border-radius: 3px; font-size: 0.8rem;
  }
  .adm-param label { color: var(--muted); min-width: 70px; white-space: nowrap; flex-shrink: 0; }
  .adm-param input[type="range"] {
    flex: 1; accent-color: var(--accent); height: 4px; cursor: pointer;
    -webkit-appearance: none; appearance: none; background: var(--border); border-radius: 2px; outline: none;
  }
  .adm-param input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
  }
  .adm-param .adm-param-val {
    color: var(--fg); font-size: 0.78rem; width: 48px; text-align: right;
    font-variant-numeric: tabular-nums;
    background: var(--bg); border: 1px solid var(--border); border-radius: 2px;
    padding: 2px 4px; font-family: inherit; outline: none;
    -moz-appearance: textfield;
  }
  .adm-param .adm-param-val::-webkit-inner-spin-button,
  .adm-param .adm-param-val::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .adm-param .adm-param-val:focus { border-color: var(--accent); }
  .adm-param input[type="text"], .adm-param select {
    background: var(--bg); border: 1px solid var(--border); color: var(--fg);
    font-family: inherit; font-size: 0.8rem; padding: 3px 8px; outline: none;
  }
  .adm-param input[type="text"] { width: 120px; }
  .adm-param select { width: 140px; }
  .adm-param input:focus, .adm-param select:focus { border-color: var(--accent); }
  .adm-param-none { opacity: 0.4; }
  .adm-param-none input[type="range"] { pointer-events: none; }
  .adm-param-none .adm-param-val { color: var(--muted); }
  .adm-none-toggle { transition: background 0.15s, color 0.15s, border-color 0.15s; }
  .adm-none-toggle.active { background: var(--border); color: var(--fg); border-color: var(--muted); }
  .adm-preset-actions { display: flex; gap: 6px; margin-top: 12px; }

  /* Guestbook entry */
  .adm-gb-msg { font-size: 0.88rem; line-height: 1.6; margin-top: 4px; white-space: pre-wrap; word-break: break-word; }
  .adm-gb-context { color: var(--muted); font-size: 0.78rem; }

  /* Arcade entry */
  .adm-arc-desc { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }
  .adm-arc-author { color: var(--muted); font-size: 0.78rem; }
</style>

<script>
(function () {
  var API = '/api/themes';
  var masterCode = localStorage.getItem('bc-admin-code') || '';
  var presets = {};

  // ── Auth ──
  var codeInput = document.getElementById('adm-code');
  var loginBtn = document.getElementById('adm-login');
  var authErr = document.getElementById('adm-auth-err');

  function headers() {
    return { 'Content-Type': 'application/json', 'X-Master-Code': masterCode };
  }

  function doLogin() {
    masterCode = codeInput.value.trim();
    if (!masterCode) { authErr.textContent = 'enter code'; return; }
    authErr.textContent = 'checking...';
    fetch(API + '?action=verify', { headers: { 'X-Master-Code': masterCode } })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        if (!d.ok) { authErr.textContent = 'wrong code'; return; }
        localStorage.setItem('bc-admin-code', masterCode);
        showPanel();
      })
      .catch(function () { authErr.textContent = 'network error'; });
  }

  loginBtn.addEventListener('click', doLogin);
  codeInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin(); });

  // auto-login if saved
  if (masterCode) {
    fetch(API + '?action=verify', { headers: { 'X-Master-Code': masterCode } })
      .then(function (r) { return r.json(); })
      .then(function (d) { if (d.ok) showPanel(); })
      .catch(function () {});
  }

  function showPanel() {
    document.getElementById('admin-auth').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    loadPresets();
  }

  // Logout
  document.getElementById('adm-logout').addEventListener('click', function () {
    localStorage.removeItem('bc-admin-code');
    masterCode = '';
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('admin-auth').style.display = 'flex';
    codeInput.value = '';
    authErr.textContent = '';
  });

  // ── Tabs ──
  document.querySelectorAll('.adm-tab').forEach(function (tab) {
    tab.addEventListener('click', function () {
      document.querySelectorAll('.adm-tab').forEach(function (t) { t.classList.remove('active'); });
      document.querySelectorAll('.adm-tab-content').forEach(function (c) { c.style.display = 'none'; });
      tab.classList.add('active');
      var target = document.getElementById('tab-' + tab.getAttribute('data-tab'));
      if (target) target.style.display = 'block';
      // lazy load
      if (tab.getAttribute('data-tab') === 'guestbook') loadGuestbook();
      if (tab.getAttribute('data-tab') === 'comments') loadComments();
      if (tab.getAttribute('data-tab') === 'arcade') loadArcade();
    });
  });

  // ══════════════════════════════════════════════════════════════
  // PRESETS
  // ══════════════════════════════════════════════════════════════
  var THEMES = ['tokyo-night','gruvbox','dracula','rose-pine','github-light','papercolor-light','hacker'];
  var SIMS = ['combo','life','boids'];

  function seedFromCode() {
    if (typeof window.getPresetNames !== 'function') return;
    var names = window.getPresetNames();
    names.forEach(function (n) {
      var p = window._getPresetData ? window._getPresetData(n) : null;
      if (p) presets[n] = JSON.parse(JSON.stringify(p));
    });
  }

  function loadPresets() {
    document.getElementById('preset-status').textContent = 'loading...';
    fetch(API + '?action=presets')
      .then(function (r) { return r.json(); })
      .then(function (d) {
        presets = d.presets || {};
        if (!Object.keys(presets).length) {
          seedFromCode();
          document.getElementById('preset-status').textContent = Object.keys(presets).length + ' presets (from code — save to persist)';
        } else {
          document.getElementById('preset-status').textContent = Object.keys(presets).length + ' presets';
        }
        renderPresets();
      })
      .catch(function (err) { document.getElementById('preset-status').textContent = 'error: ' + err.message; });
  }

  var themeColors = {'tokyo-night':'#7aa2f7','gruvbox':'#d79921','dracula':'#bd93f9','rose-pine':'#b4637a','github-light':'#0969da','papercolor-light':'#005f87','hacker':'#00ff41'};
  var originalPresets = {};

  // slider definitions: key, label, min, max, step
  var PARAM_SLIDERS = [
    {key:'life.cell',label:'cell size',min:1,max:80,step:1},
    {key:'life.opacity',label:'life opacity',min:0,max:100,step:1},
    {key:'life.glow',label:'life glow',min:0,max:100,step:1},
    {key:'life.autofill',label:'autofill',min:0,max:100,step:1},
    {key:'life.rainbow',label:'rainbow',min:0,max:3,step:1},
    {key:'boids.n',label:'boid count',min:1,max:1000,step:1},
    {key:'boids.size',label:'boid size',min:1,max:200,step:1},
    {key:'boids.tick',label:'boid speed',min:0.1,max:5,step:0.1},
    {key:'boids.opacity',label:'boid opacity',min:0,max:100,step:1},
    {key:'boids.glow',label:'boid glow',min:0,max:100,step:1},
    {key:'boids.perception',label:'perception',min:1,max:500,step:1},
    {key:'boids.separation',label:'separation',min:0,max:300,step:1},
    {key:'trail.on',label:'trail',min:0,max:1,step:1},
    {key:'trail.size',label:'trail size',min:1,max:10,step:1},
    {key:'trail.glow',label:'trail glow',min:0,max:100,step:1},
    {key:'trail.decay',label:'trail decay',min:0,max:100,step:1},
  ];
  var SPEED_SLIDERS = [
    {key:'lspeed',label:'life speed',min:0,max:100,step:1},
    {key:'bspeed',label:'boid speed',min:0,max:100,step:1},
  ];

  function liveApply(name, p) {
    if (!window.applyPreset) return;
    // inject preset data into the live sim
    if (window._setPresetData) window._setPresetData(name, p);
    window.applyPreset(name);
  }

  function renderPresets() {
    var list = document.getElementById('preset-list');
    list.innerHTML = '';
    // save originals for reset
    if (!Object.keys(originalPresets).length) originalPresets = JSON.parse(JSON.stringify(presets));

    Object.keys(presets).forEach(function (name) {
      var p = presets[name];
      var card = document.createElement('div');
      card.className = 'adm-card';

      var bar = document.createElement('div');
      bar.className = 'adm-card-bar';
      var arrow = document.createElement('span');
      arrow.className = 'adm-card-arrow';
      arrow.textContent = '\u25B6';
      var swatch = document.createElement('span');
      swatch.className = 'adm-preset-swatch';
      swatch.style.background = themeColors[p.theme] || 'var(--accent)';
      var title = document.createElement('span');
      title.className = 'adm-card-title';
      title.textContent = name;
      var meta = document.createElement('span');
      meta.className = 'adm-card-meta';
      meta.textContent = p.sim + (p.theme ? ' / ' + p.theme : '') + (p.desc ? ' / ' + p.desc : '');

      var actions = document.createElement('span');
      actions.className = 'adm-card-actions';
      var delBtn = document.createElement('button');
      delBtn.className = 'adm-btn adm-btn-sm adm-btn-danger';
      delBtn.textContent = 'delete';
      delBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        if (!confirm('delete "' + name + '"?')) return;
        delete presets[name];
        renderPresets();
      });
      actions.appendChild(delBtn);

      bar.appendChild(arrow);
      bar.appendChild(swatch);
      bar.appendChild(title);
      bar.appendChild(meta);
      bar.appendChild(actions);
      bar.addEventListener('click', function () { card.classList.toggle('expanded'); });

      var body = document.createElement('div');
      body.className = 'adm-card-body';

      // Top controls
      var topGrid = document.createElement('div');
      topGrid.className = 'adm-param-grid';
      topGrid.style.marginBottom = '10px';
      topGrid.appendChild(mkSelect('sim', p.sim, SIMS, function (v) { p.sim = v; meta.textContent = p.sim + (p.theme ? ' / ' + p.theme : ''); liveApply(name, p); }));
      topGrid.appendChild(mkSelect('theme', p.theme || '', [''].concat(THEMES), function (v) { p.theme = v || undefined; swatch.style.background = themeColors[v] || 'var(--accent)'; meta.textContent = p.sim + (p.theme ? ' / ' + p.theme : ''); liveApply(name, p); }));
      topGrid.appendChild(mkText('desc', p.desc || '', function (v) { p.desc = v; }));
      body.appendChild(topGrid);

      // Speed sliders
      var speedGrid = document.createElement('div');
      speedGrid.className = 'adm-param-grid';
      speedGrid.style.marginBottom = '10px';
      SPEED_SLIDERS.forEach(function (s) {
        speedGrid.appendChild(mkSpeedSlider(s, p, name));
      });
      body.appendChild(speedGrid);

      // Param sliders
      if (!p.params) p.params = {};
      var paramLabel = document.createElement('div');
      paramLabel.style.cssText = 'font-size:0.78rem;color:var(--muted);margin:8px 0 6px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;';
      paramLabel.textContent = 'params';
      body.appendChild(paramLabel);

      var paramGrid = document.createElement('div');
      paramGrid.className = 'adm-param-grid';
      PARAM_SLIDERS.forEach(function (s) {
        paramGrid.appendChild(mkParamSlider(s, p, name));
      });
      body.appendChild(paramGrid);

      // Action buttons
      var actionsRow = document.createElement('div');
      actionsRow.className = 'adm-preset-actions';

      var previewBtn = document.createElement('button');
      previewBtn.className = 'adm-btn adm-btn-sm';
      previewBtn.textContent = 'preview';
      previewBtn.addEventListener('click', function (e) { e.stopPropagation(); liveApply(name, p); });

      var resetBtn = document.createElement('button');
      resetBtn.className = 'adm-btn adm-btn-sm';
      resetBtn.textContent = 'reset';
      resetBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        if (originalPresets[name]) {
          presets[name] = JSON.parse(JSON.stringify(originalPresets[name]));
          var p2 = presets[name];
          // update sliders in-place instead of re-rendering
          body.innerHTML = '';
          var topGrid2 = document.createElement('div');
          topGrid2.className = 'adm-param-grid';
          topGrid2.style.marginBottom = '10px';
          topGrid2.appendChild(mkSelect('sim', p2.sim, SIMS, function (v) { p2.sim = v; meta.textContent = p2.sim + (p2.theme ? ' / ' + p2.theme : ''); liveApply(name, p2); }));
          topGrid2.appendChild(mkSelect('theme', p2.theme || '', [''].concat(THEMES), function (v) { p2.theme = v || undefined; swatch.style.background = themeColors[v] || 'var(--accent)'; meta.textContent = p2.sim + (p2.theme ? ' / ' + p2.theme : ''); liveApply(name, p2); }));
          topGrid2.appendChild(mkText('desc', p2.desc || '', function (v) { p2.desc = v; }));
          body.appendChild(topGrid2);
          var speedGrid2 = document.createElement('div');
          speedGrid2.className = 'adm-param-grid';
          speedGrid2.style.marginBottom = '10px';
          SPEED_SLIDERS.forEach(function (s) {
            speedGrid2.appendChild(mkSpeedSlider(s, p2, name));
          });
          body.appendChild(speedGrid2);
          if (!p2.params) p2.params = {};
          var paramLabel2 = document.createElement('div');
          paramLabel2.style.cssText = 'font-size:0.78rem;color:var(--muted);margin:8px 0 6px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;';
          paramLabel2.textContent = 'params';
          body.appendChild(paramLabel2);
          var paramGrid2 = document.createElement('div');
          paramGrid2.className = 'adm-param-grid';
          PARAM_SLIDERS.forEach(function (s) {
            paramGrid2.appendChild(mkParamSlider(s, p2, name));
          });
          body.appendChild(paramGrid2);
          var actionsRow2 = document.createElement('div');
          actionsRow2.className = 'adm-preset-actions';
          actionsRow2.appendChild(previewBtn);
          actionsRow2.appendChild(resetBtn);
          body.appendChild(actionsRow2);
          meta.textContent = p2.sim + (p2.theme ? ' / ' + p2.theme : '') + (p2.desc ? ' / ' + p2.desc : '');
          swatch.style.background = themeColors[p2.theme] || 'var(--accent)';
          liveApply(name, p2);
        }
      });

      actionsRow.appendChild(previewBtn);
      actionsRow.appendChild(resetBtn);
      body.appendChild(actionsRow);

      card.appendChild(bar);
      card.appendChild(body);
      list.appendChild(card);
    });
  }

  function mkSlider(label, value, min, max, step, onChange) {
    var el = document.createElement('div');
    el.className = 'adm-param';
    var lbl = document.createElement('label');
    lbl.textContent = label;
    var numInp = document.createElement('input');
    numInp.type = 'number';
    numInp.className = 'adm-param-val';
    numInp.min = min; numInp.max = max; numInp.step = step;
    numInp.value = value != null ? value : min;
    var inp = document.createElement('input');
    inp.type = 'range';
    inp.min = min; inp.max = max; inp.step = step;
    inp.value = value != null ? value : min;
    inp.addEventListener('input', function () {
      var v = step < 1 ? parseFloat(inp.value) : parseInt(inp.value, 10);
      numInp.value = v;
      onChange(v);
    });
    numInp.addEventListener('change', function () {
      var v = step < 1 ? parseFloat(numInp.value) : parseInt(numInp.value, 10);
      if (isNaN(v)) v = min;
      if (v < min) v = min;
      if (v > max) v = max;
      numInp.value = v;
      inp.value = v;
      onChange(v);
    });
    el.appendChild(lbl);
    el.appendChild(inp);
    el.appendChild(numInp);
    return el;
  }

  function mkText(label, value, onChange) {
    var el = document.createElement('div');
    el.className = 'adm-param';
    var lbl = document.createElement('label');
    lbl.textContent = label;
    var inp = document.createElement('input');
    inp.type = 'text';
    inp.value = value;
    inp.addEventListener('change', function () { onChange(inp.value); });
    el.appendChild(lbl);
    el.appendChild(inp);
    return el;
  }

  function mkSelect(label, value, options, onChange) {
    var el = document.createElement('div');
    el.className = 'adm-param';
    var lbl = document.createElement('label');
    lbl.textContent = label;
    var sel = document.createElement('select');
    options.forEach(function (o) {
      var opt = document.createElement('option');
      opt.value = o; opt.textContent = o || '(none)';
      if (o === value) opt.selected = true;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', function () { onChange(sel.value); });
    el.appendChild(lbl);
    el.appendChild(sel);
    return el;
  }

  function mkSpeedSlider(s, p, presetName) {
    var isNone = p[s.key] == null;
    var el = document.createElement('div');
    el.className = 'adm-param' + (isNone ? ' adm-param-none' : '');
    var lbl = document.createElement('label');
    lbl.textContent = s.label;
    var noneBtn = document.createElement('button');
    noneBtn.className = 'adm-btn adm-btn-sm adm-none-toggle' + (isNone ? ' active' : '');
    noneBtn.textContent = 'none';
    noneBtn.style.cssText = 'font-size:0.65rem;padding:2px 6px;margin-right:2px;flex-shrink:0;';
    var inp = document.createElement('input');
    inp.type = 'range'; inp.min = s.min; inp.max = s.max; inp.step = s.step;
    inp.value = isNone ? 15 : p[s.key]; inp.disabled = isNone;
    var numInp = document.createElement('input');
    numInp.type = 'number'; numInp.className = 'adm-param-val';
    numInp.min = s.min; numInp.max = s.max; numInp.step = s.step;
    numInp.value = isNone ? '' : p[s.key]; numInp.disabled = isNone;
    if (isNone) numInp.placeholder = '—';
    noneBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      isNone = !isNone;
      noneBtn.classList.toggle('active', isNone);
      el.classList.toggle('adm-param-none', isNone);
      inp.disabled = isNone; numInp.disabled = isNone;
      if (isNone) { p[s.key] = null; numInp.value = ''; numInp.placeholder = '—'; }
      else { p[s.key] = 15; inp.value = 15; numInp.value = 15; numInp.placeholder = ''; liveApply(presetName, p); }
    });
    inp.addEventListener('input', function () {
      if (isNone) return;
      var v = parseInt(inp.value, 10); numInp.value = v; p[s.key] = v; liveApply(presetName, p);
    });
    numInp.addEventListener('change', function () {
      if (isNone) return;
      var v = parseInt(numInp.value, 10);
      if (isNaN(v)) v = s.min; v = Math.max(s.min, Math.min(s.max, v));
      numInp.value = v; inp.value = v; p[s.key] = v; liveApply(presetName, p);
    });
    el.appendChild(lbl); el.appendChild(noneBtn); el.appendChild(inp); el.appendChild(numInp);
    return el;
  }

  var PARAM_DEFAULTS = {
    'life.cell':7,'life.opacity':9,'life.glow':0,'life.autofill':50,'life.rainbow':0,
    'boids.n':120,'boids.size':14,'boids.tick':1.8,'boids.opacity':14,'boids.glow':0,
    'boids.perception':52,'boids.separation':38,
    'trail.on':0,'trail.size':2,'trail.glow':12,'trail.decay':80
  };

  function mkParamSlider(s, p, presetName) {
    var isNone = p.params[s.key] == null;
    var el = document.createElement('div');
    el.className = 'adm-param' + (isNone ? ' adm-param-none' : '');

    var lbl = document.createElement('label');
    lbl.textContent = s.label;

    var noneBtn = document.createElement('button');
    noneBtn.className = 'adm-btn adm-btn-sm adm-none-toggle' + (isNone ? ' active' : '');
    noneBtn.textContent = 'none';
    noneBtn.style.cssText = 'font-size:0.65rem;padding:2px 6px;margin-right:2px;flex-shrink:0;';

    var inp = document.createElement('input');
    inp.type = 'range';
    inp.min = s.min; inp.max = s.max; inp.step = s.step;
    inp.value = isNone ? (PARAM_DEFAULTS[s.key] || s.min) : p.params[s.key];
    inp.disabled = isNone;

    var numInp = document.createElement('input');
    numInp.type = 'number';
    numInp.className = 'adm-param-val';
    numInp.min = s.min; numInp.max = s.max; numInp.step = s.step;
    numInp.value = isNone ? '' : (p.params[s.key] != null ? p.params[s.key] : s.min);
    numInp.disabled = isNone;
    if (isNone) numInp.placeholder = '—';

    noneBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      isNone = !isNone;
      noneBtn.classList.toggle('active', isNone);
      el.classList.toggle('adm-param-none', isNone);
      inp.disabled = isNone;
      numInp.disabled = isNone;
      if (isNone) {
        delete p.params[s.key];
        numInp.value = '';
        numInp.placeholder = '—';
      } else {
        var def = PARAM_DEFAULTS[s.key] || parseFloat(s.min);
        p.params[s.key] = def;
        inp.value = def;
        numInp.value = def;
        numInp.placeholder = '';
        liveApply(presetName, p);
      }
    });

    inp.addEventListener('input', function () {
      if (isNone) return;
      var v = s.step < 1 ? parseFloat(inp.value) : parseInt(inp.value, 10);
      numInp.value = v;
      p.params[s.key] = v;
      liveApply(presetName, p);
    });
    numInp.addEventListener('change', function () {
      if (isNone) return;
      var v = s.step < 1 ? parseFloat(numInp.value) : parseInt(numInp.value, 10);
      if (isNaN(v)) v = parseFloat(s.min);
      if (v < s.min) v = parseFloat(s.min);
      if (v > s.max) v = parseFloat(s.max);
      numInp.value = v;
      inp.value = v;
      p.params[s.key] = v;
      liveApply(presetName, p);
    });

    el.appendChild(lbl);
    el.appendChild(noneBtn);
    el.appendChild(inp);
    el.appendChild(numInp);
    return el;
  }

  // New preset
  document.getElementById('preset-new').addEventListener('click', function () {
    var name = prompt('preset name:');
    if (!name || !name.trim()) return;
    name = name.trim().toLowerCase().replace(/[^a-z0-9-]/g, '-');
    if (presets[name]) { alert('"' + name + '" already exists'); return; }
    presets[name] = {
      sim: 'combo', theme: '', desc: '',
      lspeed: 40, bspeed: 40,
      params: {
        'life.cell': 10, 'life.opacity': 40, 'life.glow': 0, 'life.autofill': 30, 'life.rainbow': 0,
        'boids.n': 120, 'boids.size': 6, 'boids.tick': 1, 'boids.opacity': 80, 'boids.glow': 0,
        'boids.perception': 100, 'boids.separation': 50,
        'trail.on': 0, 'trail.size': 3, 'trail.glow': 0, 'trail.decay': 15
      }
    };
    renderPresets();
    // scroll to bottom and expand the new card
    var cards = document.querySelectorAll('#preset-list .adm-card');
    var last = cards[cards.length - 1];
    if (last) { last.classList.add('expanded'); last.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
  });

  // Save presets
  document.getElementById('preset-save').addEventListener('click', function () {
    document.getElementById('preset-status').textContent = 'saving...';
    fetch(API, {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({ action: 'save-presets', presets: presets })
    }).then(function (r) { return r.json(); }).then(function (d) {
      if (d.error) { document.getElementById('preset-status').textContent = 'error: ' + d.error; return; }
      document.getElementById('preset-status').textContent = 'saved ' + d.count + ' presets';
    }).catch(function (err) { document.getElementById('preset-status').textContent = 'error: ' + err.message; });
  });

  // ══════════════════════════════════════════════════════════════
  // GUESTBOOK
  // ══════════════════════════════════════════════════════════════
  var gbLoaded = false;
  function loadGuestbook() {
    if (gbLoaded) return;
    gbLoaded = true;
    document.getElementById('gb-status').textContent = 'loading...';
    fetch(API + '?action=guestbook', { headers: headers() })
      .then(function (r) { return r.json(); })
      .then(function (entries) {
        if (entries.error) { document.getElementById('gb-status').textContent = entries.error; return; }
        document.getElementById('gb-status').textContent = entries.length + ' entries';
        renderGuestbook(entries);
      })
      .catch(function (err) { document.getElementById('gb-status').textContent = 'error: ' + err.message; });
  }

  function renderGuestbook(entries) {
    var list = document.getElementById('gb-list');
    list.innerHTML = '';
    if (!entries.length) { list.innerHTML = '<p style="color:var(--muted)">no entries</p>'; return; }
    entries.forEach(function (e) {
      var card = document.createElement('div');
      card.className = 'adm-card';

      var bar = document.createElement('div');
      bar.className = 'adm-card-bar';

      var title = document.createElement('span');
      title.className = 'adm-card-title';
      title.textContent = e.name || 'anonymous';

      var meta = document.createElement('span');
      meta.className = 'adm-card-meta';
      meta.textContent = (e.context ? e.context + ' /' : '') + (e.date || '');

      var actions = document.createElement('span');
      actions.className = 'adm-card-actions';
      var delBtn = document.createElement('button');
      delBtn.className = 'adm-btn adm-btn-sm adm-btn-danger';
      delBtn.textContent = 'delete';
      delBtn.addEventListener('click', function (ev) {
        ev.stopPropagation();
        if (!confirm('delete entry by "' + (e.name || 'anonymous') + '"?')) return;
        delBtn.textContent = '...';
        fetch(API, {
          method: 'POST',
          headers: headers(),
          body: JSON.stringify({ action: 'delete-guestbook', id: e.id })
        }).then(function (r) { return r.json(); }).then(function (d) {
          if (d.ok) { card.remove(); }
          else { delBtn.textContent = 'err'; }
        }).catch(function () { delBtn.textContent = 'err'; });
      });
      actions.appendChild(delBtn);

      bar.appendChild(title);
      bar.appendChild(meta);
      bar.appendChild(actions);

      var msg = document.createElement('div');
      msg.className = 'adm-gb-msg';
      msg.textContent = e.message || '';

      card.appendChild(bar);
      card.appendChild(msg);
      list.appendChild(card);
    });
  }

  // ══════════════════════════════════════════════════════════════
  // ARCADE
  // ══════════════════════════════════════════════════════════════
  var arcLoaded = false;
  function loadArcade() {
    if (arcLoaded) return;
    arcLoaded = true;
    document.getElementById('arc-status').textContent = 'loading...';
    fetch(API + '?action=games', { headers: headers() })
      .then(function (r) { return r.json(); })
      .then(function (games) {
        if (games.error) { document.getElementById('arc-status').textContent = games.error; return; }
        document.getElementById('arc-status').textContent = games.length + ' games';
        renderArcade(games);
      })
      .catch(function (err) { document.getElementById('arc-status').textContent = 'error: ' + err.message; });
  }

  function renderArcade(games) {
    var list = document.getElementById('arc-list');
    list.innerHTML = '';
    if (!games.length) { list.innerHTML = '<p style="color:var(--muted)">no games</p>'; return; }
    games.forEach(function (g) {
      var card = document.createElement('div');
      card.className = 'adm-card';

      var bar = document.createElement('div');
      bar.className = 'adm-card-bar';

      var arrow = document.createElement('span');
      arrow.className = 'adm-card-arrow';
      arrow.textContent = '\u25B6';

      var title = document.createElement('span');
      title.className = 'adm-card-title';
      title.textContent = g.title || g.id;

      var meta = document.createElement('span');
      meta.className = 'adm-card-meta';
      meta.textContent = (g.author || 'anon') + ' / ' + (g.date || '');

      var actions = document.createElement('span');
      actions.className = 'adm-card-actions';
      var delBtn = document.createElement('button');
      delBtn.className = 'adm-btn adm-btn-sm adm-btn-danger';
      delBtn.textContent = 'delete';
      delBtn.addEventListener('click', function (ev) {
        ev.stopPropagation();
        if (!confirm('delete "' + (g.title || g.id) + '"?')) return;
        delBtn.textContent = '...';
        fetch(API, {
          method: 'POST',
          headers: headers(),
          body: JSON.stringify({ action: 'delete-game', id: g.id })
        }).then(function (r) { return r.json(); }).then(function (d) {
          if (d.ok) { card.remove(); }
          else { delBtn.textContent = 'err'; }
        }).catch(function () { delBtn.textContent = 'err'; });
      });
      actions.appendChild(delBtn);

      bar.appendChild(arrow);
      bar.appendChild(title);
      bar.appendChild(meta);
      bar.appendChild(actions);
      bar.addEventListener('click', function () { card.classList.toggle('expanded'); });

      // Body with game details
      var body = document.createElement('div');
      body.className = 'adm-card-body';
      body.innerHTML =
        '<div class="adm-arc-desc">' + (g.desc || 'no description') + '</div>' +
        '<div style="margin-top:8px;font-size:0.78rem;color:var(--muted);">' +
        'id: ' + (g.id || '') + ' / lb: ' + (g.lbMode || 'none') + (g.locked ? ' / locked' : '') +
        '</div>';

      card.appendChild(bar);
      card.appendChild(body);
      list.appendChild(card);
    });
  }
  // ══════════════════════════════════════════════════════════════
  // COMMENTS
  // ══════════════════════════════════════════════════════════════
  var cmtLoaded = false;
  function loadComments() {
    if (cmtLoaded) return;
    cmtLoaded = true;
    document.getElementById('cmt-status').textContent = 'loading...';
    fetch('/api/comments?action=all', { headers: headers() })
      .then(function (r) { return r.json(); })
      .then(function (comments) {
        if (comments.error) { document.getElementById('cmt-status').textContent = comments.error; return; }
        document.getElementById('cmt-status').textContent = comments.length + ' comments';
        renderComments(comments);
      })
      .catch(function (err) { document.getElementById('cmt-status').textContent = 'error: ' + err.message; });
  }

  function renderComments(comments) {
    var list = document.getElementById('cmt-list-admin');
    list.innerHTML = '';
    if (!comments.length) { list.innerHTML = '<p style="color:var(--muted)">no comments</p>'; return; }
    comments.forEach(function (c) {
      var card = document.createElement('div');
      card.className = 'adm-card';

      var bar = document.createElement('div');
      bar.className = 'adm-card-bar';

      var title = document.createElement('span');
      title.className = 'adm-card-title';
      title.textContent = c.name || 'anonymous';

      var meta = document.createElement('span');
      meta.className = 'adm-card-meta';
      var slug = c._slug || '';
      var dateStr = c.date ? c.date.split('T')[0] : '';
      meta.textContent = slug + (dateStr ? ' / ' + dateStr : '') + (c.replyTo ? ' / reply' : '');

      var actions = document.createElement('span');
      actions.className = 'adm-card-actions';
      var delBtn = document.createElement('button');
      delBtn.className = 'adm-btn adm-btn-sm adm-btn-danger';
      delBtn.textContent = 'delete';
      delBtn.addEventListener('click', function (ev) {
        ev.stopPropagation();
        if (!confirm('delete comment by "' + (c.name || 'anonymous') + '"?')) return;
        delBtn.textContent = '...';
        fetch('/api/comments', {
          method: 'POST',
          headers: headers(),
          body: JSON.stringify({ action: 'delete', id: c.id, slug: c._slug })
        }).then(function (r) { return r.json(); }).then(function (d) {
          if (d.ok) { card.remove(); }
          else { delBtn.textContent = 'err'; }
        }).catch(function () { delBtn.textContent = 'err'; });
      });
      actions.appendChild(delBtn);

      bar.appendChild(title);
      bar.appendChild(meta);
      bar.appendChild(actions);

      var msg = document.createElement('div');
      msg.className = 'adm-gb-msg';
      msg.textContent = c.message || '';

      card.appendChild(bar);
      card.appendChild(msg);
      list.appendChild(card);
    });
  }
})();
