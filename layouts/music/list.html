{{ define "main" }}

{{ partial "breadcrumbs.html" . }}

<h1 class="project-title">{{ .Title }}</h1>

{{ with .RegularPages }}
<ul>
  {{ range . }}
  <li>
    <span class="li-name"><a href="{{ .Permalink }}">{{ .Title }}</a></span>:
    <span class="li-desc">{{ .Params.summary }}</span>
    <div class="li-meta">{{ .Params.tools }} · {{ .Params.year }} · {{ .Params.status }}</div>
  </li>
  {{ end }}
</ul>
{{ else }}<p class="empty-note">nothing yet</p>{{ end }}

{{ end }}
