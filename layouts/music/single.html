{{ define "main" }}

{{ partial "breadcrumbs.html" . }}

<h1 class="project-title">{{ .Title }}</h1>

<div class="project-meta">{{ .Params.tools }} · {{ .Params.year }} · {{ .Params.status }}</div>
{{ with .Params.cover }}
<img src="{{ . }}" alt="{{ $.Title }} cover" class="album-cover" loading="lazy" width="280" height="280">
{{ end }}

{{ .Content }}

{{ with .Params.links }}
<div class="links">
  {{ range . }}
  <a href="{{ .url }}" target="_blank">{{ .label }} ↗</a>
  {{ end }}
</div>
{{ end }}

{{ end }}
